<text x="268" y="115" xml:space="preserve" font-size="14"><tspan fill="#8b949e"> ────────────────────────</tspan></text>
<text x="268" y="153" xml:space="preserve" font-size="14"><tspan fill="#8b949e">┌───────────────────────Hardware───────────────────────┐</tspan></text>
<text x="268" y="172" xml:space="preserve" font-size="14"><tspan fill="#3fb950"> Chassis      </tspan><tspan fill="#c9d1d9"> fox - blue/black and fluffy</tspan></text>
<text x="268" y="191" xml:space="preserve" font-size="14"><tspan fill="#3fb950">│ ├ Cooling   </tspan><tspan fill="#c9d1d9"> floof (passive; thermally inadvisable)</tspan></text>
<text x="268" y="210" xml:space="preserve" font-size="14"><tspan fill="#3fb950">│ ├ Sensors   </tspan><tspan fill="#c9d1d9"> green eyes · large ears</tspan></text>
<text x="268" y="229" xml:space="preserve" font-size="14"><tspan fill="#3fb950">└ └ Interrupts</tspan><tspan fill="#c9d1d9"> bell collar (non-maskable)</tspan></text>
<text x="268" y="248" xml:space="preserve" font-size="14"><tspan fill="#8b949e">└──────────────────────────────────────────────────────┘</tspan></text>
<text x="268" y="286" xml:space="preserve" font-size="14"><tspan fill="#8b949e">┌───────────────────────Software───────────────────────┐</tspan></text>
<text x="268" y="305" xml:space="preserve" font-size="14"><tspan fill="#d29922"> OS           </tspan><tspan fill="#c9d1d9"> Arch Linux (yes, btw)</tspan></text>
<text x="268" y="324" xml:space="preserve" font-size="14"><tspan fill="#d29922">│ ├ Shell     </tspan><tspan fill="#c9d1d9"> bash, catastrophically over-configured</tspan></text>
<text x="268" y="343" xml:space="preserve" font-size="14"><tspan fill="#d29922">│ ├ Editor    </tspan><tspan fill="#c9d1d9"> whichever one I left open</tspan></text>
<text x="268" y="362" xml:space="preserve" font-size="14"><tspan fill="#d29922">└ └ Languages </tspan><tspan fill="#c9d1d9"> C++ · CUDA · Python · solder</tspan></text>
<text x="268" y="381" xml:space="preserve" font-size="14"><tspan fill="#8b949e">└──────────────────────────────────────────────────────┘</tspan></text>
<text x="268" y="419" xml:space="preserve" font-size="14"><tspan fill="#8b949e">┌────────────────────────System────────────────────────┐</tspan></text>
<text x="268" y="438" xml:space="preserve" font-size="14"><tspan fill="#bc8cff">  Pronouns    </tspan><tspan fill="#c9d1d9"> she/her</tspan></text>
<text x="268" y="457" xml:space="preserve" font-size="14"><tspan fill="#bc8cff">  Day job     </tspan><tspan fill="#c9d1d9"> making big science go very fast on GPUs</tspan></text>
<text x="268" y="476" xml:space="preserve" font-size="14"><tspan fill="#bc8cff">  Night job   </tspan><tspan fill="#c9d1d9"> making very small PCBs go beep</tspan></text>
<text x="268" y="495" xml:space="preserve" font-size="14"><tspan fill="#bc8cff">  Load        </tspan><tspan fill="#c9d1d9"> 3.14 2.72 1.62 (4 paws)</tspan></text>
<text x="268" y="514" xml:space="preserve" font-size="14"><tspan fill="#bc8cff">  Uptime      </tspan><tspan fill="#c9d1d9"> do not ask</tspan></text>
